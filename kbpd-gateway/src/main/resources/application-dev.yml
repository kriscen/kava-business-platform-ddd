# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:*"
            allowed-methods:
              - GET
              - POST
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
            max-age: 3600
      routes:
        - id: kbpd-auth
          uri: http://localhost:8600
          predicates:
            - Path=/auth/**
        - id: kbpd-upms
          uri: http://localhost:8610
          predicates:
            - Path=/upms/**
        - id: kbpd-member
          uri: http://localhost:8620
          predicates:
            - Path=/member/**